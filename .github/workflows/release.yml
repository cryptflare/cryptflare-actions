name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Force all JavaScript actions to run on Node 24 ahead of GitHub's
# June 2026 default flip. Silences the Node 20 deprecation warning
# from release-please-action and any other js-based action in here.
# Remove once every action in this workflow has bumped its own runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release-please:
    name: Release please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@v4.4.1
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  update-major-tag:
    name: Move major tag
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force-update v<major> tag to new release
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          MAJOR: v${{ needs.release-please.outputs.major }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -fa "$MAJOR" "$TAG" -m "Update $MAJOR tag to $TAG"
          git push origin "$MAJOR" --force
