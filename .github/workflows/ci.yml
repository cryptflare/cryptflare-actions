name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Force all JavaScript actions to run on Node 24 ahead of GitHub's
# June 2026 default flip. Covers reviewdog/action-actionlint,
# mpalmer/action-validator, pnpm/action-setup, actions/setup-node,
# actions/upload-artifact, etc. Remove once every action in here
# has bumped its own runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-action:
    name: Lint action.yml and workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check
          fail_level: error

      - name: Validate every action.yml against the GitHub schema
        uses: mpalmer/action-validator@v0.9.0
        with:
          path: action.yml

  commitlint:
    name: Lint commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate commits in PR
        run: |
          pnpm commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose

  build:
    name: Build & verify dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

      - name: Build all actions
        run: pnpm build

      - name: Verify dist/ is in sync with src/
        run: |
          if [ -n "$(git status --porcelain 'dist' '**/dist')" ]; then
            echo "::error::dist/ is out of date. Run 'pnpm build' and commit the result."
            git --no-pager diff -- 'dist' '**/dist'
            exit 1
          fi

  test:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run vitest across all workspace packages
        run: pnpm -r --workspace-concurrency=1 run test

      - name: Run core/ tests with coverage
        run: pnpm --filter @cryptflare-actions/core exec vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-core
          path: core/coverage/
          retention-days: 7
          if-no-files-found: ignore
